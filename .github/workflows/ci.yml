name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-gi gir1.2-gtk-3.0 gir1.2-webkit2-4.1 gir1.2-gtksource-4 \
            python3-markdown python3-pygments

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install QA tools
        run: python -m pip install --upgrade pip ruff pyflakes pytest markdown pygments

      - name: Syntax check
        run: python3 -m py_compile vertexmarkdown.py vertexmarkdown_core.py

      - name: Ruff
        run: ruff check --no-cache --select F,W,B,UP,E701,E702 vertexmarkdown.py vertexmarkdown_core.py

      - name: Pyflakes
        run: pyflakes vertexmarkdown.py vertexmarkdown_core.py

      - name: Pytest
        run: pytest -q

      - name: AST symbol smoke test
        run: |
          python3 - <<'EOF'
          import ast
          from pathlib import Path

          src = Path("vertexmarkdown.py").read_text(encoding="utf-8")
          tree = ast.parse(src, filename="vertexmarkdown.py")
          defined = set()

          for node in tree.body:
              if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)):
                  defined.add(node.name)
              elif isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name):
                          defined.add(target.id)

          expected = {
              "__version__",
              "render",
              "extract_headings",
              "preprocess_tasks",
              "preprocess_transclusions",
              "toggle_task_line",
              "csv_to_markdown_table",
              "html_to_markdown",
              "CommandPalette",
              "OutlineSidebar",
              "Viewer",
          }
          missing = sorted(expected - defined)
          assert not missing, f"missing top-level symbols: {missing}"
          print("ast symbols ok")
          EOF

