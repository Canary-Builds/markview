app-id: com.canarybuilds.VertexWrite
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: vertexwrite

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-documents
  - --filesystem=xdg-download

modules:
  - name: gtksourceview4
    buildsystem: meson
    config-opts:
      - -Dgtk_doc=false
      - -Dgir=true
      - -Dvapi=false
      - -Dinstall_tests=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/gtksourceview/4.8/gtksourceview-4.8.4.tar.xz
        sha256: 7ec9d18fb283d1f84a3a3eff3b7a72b09a10c9c006597b3fbabbb5958420a87d

  - name: python3-vertexwrite-deps
    buildsystem: simple
    build-commands:
      - |
        case "$(uname -m)" in
          x86_64)
            bcrypt_wheel=bcrypt-5.0.0-cp39-abi3-manylinux_2_34_x86_64.whl
            cryptography_wheel=cryptography-47.0.0-cp311-abi3-manylinux_2_34_x86_64.whl
            cffi_wheel=cffi-2.0.0-cp313-cp313-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
            pynacl_wheel=pynacl-1.6.2-cp38-abi3-manylinux_2_34_x86_64.whl
            ;;
          aarch64)
            bcrypt_wheel=bcrypt-5.0.0-cp39-abi3-manylinux_2_34_aarch64.whl
            cryptography_wheel=cryptography-47.0.0-cp311-abi3-manylinux_2_34_aarch64.whl
            cffi_wheel=cffi-2.0.0-cp313-cp313-manylinux2014_aarch64.manylinux_2_17_aarch64.whl
            pynacl_wheel=pynacl-1.6.2-cp38-abi3-manylinux_2_34_aarch64.whl
            ;;
          *)
            echo "Unsupported architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac
        pip3 install --prefix=/app --ignore-installed --no-deps \
          Markdown-3.7-py3-none-any.whl \
          pygments-2.18.0-py3-none-any.whl \
          html2text-2025.4.15-py3-none-any.whl \
          paramiko-4.0.0-py3-none-any.whl \
          "$bcrypt_wheel" \
          "$cryptography_wheel" \
          "$cffi_wheel" \
          invoke-3.0.3-py3-none-any.whl \
          "$pynacl_wheel" \
          pycparser-3.0-py3-none-any.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/3f/08/83871f3c50fc983b88547c196d11cf8c3340e37c32d2e9d6152abe2c61f7/Markdown-3.7-py3-none-any.whl
