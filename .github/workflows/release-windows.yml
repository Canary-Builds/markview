name: Release Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to build and attach to a GitHub Release (for example v0.6.1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-win.txt pyinstaller

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            throw "ISCC.exe not found after installing Inno Setup"
          }

      - name: Build Windows bundle
        shell: pwsh
        run: python -m PyInstaller --clean -y vertexmarkdown.spec

      - name: Smoke-test packaged Qt bundle
        shell: pwsh
        run: python .\scripts\smoke_test_win_bundle.py

      - name: Build Windows installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_win.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: vertexmarkdown-windows-installer
          path: installer_output\vertexmarkdown-*-win-setup.exe

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: installer_output\vertexmarkdown-*-win-setup.exe

